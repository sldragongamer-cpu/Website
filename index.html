<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unet Solutions</title>
    <style>
        body {
          margin: 0;
          font-family:Arial,sans-serif;
          background-color: lightblue;
         }
        .navbar {
          background-color: white;
          color: Black;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 10px 15px;
         }
        .navbar-left{
          display:flex;
          align-items:center;
        }
        .navbar-left img {
          height: 40px;
          margin-right: 35px;
    }
       .navbar-left a {
         color: Black;
         text-decoration: none;
         margin-right: 25px;
         font-size: 20px;
         font-weight: bold;
        }
        .navbar-left a:hover {
         color: blue;
        }
        .dropdown {
         position:relative;
         display: inline-block
        }
        .dropdown >a {
         cursor:pointer;
        }
        .dropdown-content {
         display:none;
         position:absolute;
         background-color:white;
         min-width:160px;
         box-shadow:0px 8px 16 px rgba(0,0,0,0.2);
         z-index: 1;
        }
        .dropdown-content a {
         color:white
         padding:12px 17px;
         display:block;
        }
        .dropdown-content a:hover {
         background-color: White
        }
        .dropdown:hover .dropdown-content {
         display:block;
        }
        .navbar-right {
         display:flex;
         align-items:center;
        }
        .navbar-right span {
         margin-left: 20px;
         font-size: 22px;
         cursor:pointer;
         }
        h1 {
          font-size:60px;
          font-Family:Arial, sans-serif;
          color: Black;
        }
    </style>
</head>
<body>

<div class="navbar">
  <div class="navbar-left">
    <img src="logo.png" alt="Logo">
    <a href="#home">Home</a>
      <div class="dropdown">
    <a href="#categories">Categories</a>
     <div class="dropdown-content">
         <a href="#laptops">Laptops</a>
         <a href="#peripherals">Peripherals</a>
         <a href="#Gaming">Gaming</a>
  </div>
</div>
    <div class="navbar-right">
      <span>🔍</span>
      <span>👤</span>
      <span>🛒</span>
      <span>📄</span>
    </div>
  </div>

</body>
</html>
