<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unet Solutions</title>
    <style>
        body {
          margin: 0;
          font-family:Arial,sans-serif;
          background-color: lightblue;
         }
        .navbar {
          background-color: white;
          color: Black;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 10px 15px;
         }
        .navbar-left{
          display:flex;
          align-items:center;
          gap:40px
        }
        .navbar-left img {
          height: 40px;
    }
       .navbar-left a {
         color: Black;
         text-decoration: none;
         font-size: 20px;
         font-weight: bold;
        }
        .navbar-left a:hover {
         color: black;
        }
        .dropdown {
         position:relative;
         display: inline-block
        }
        .dropdown >a {
         cursor:pointer;
        }
        .dropdown-content {
         display:none;
         position:absolute;
         background-color:white;
         min-width:160px;
         box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
         z-index: 1;
        }
        .dropdown-content a {
         color:black
         padding:12px 17px;
         display:block;
         font-size:14px;
         line-height: 1
        }
        .dropdown-content a:hover {
         background-color: White
        }
        .dropdown:hover .dropdown-content {
         display:block;
        }
        .navbar-right {
         display:flex;
         align-items:center;
         gap:20px;
        }
        .navbar-right span {
         font-size: 22px;
         cursor:pointer;
         }
    </style>
</head>
<body>
  <div class="navbar">
    <!-- Left side: logo + links -->
    <div class="navbar-left">
      <img src="logo.png" alt="Logo">
      <a href="#home">Home</a>
      <div class="dropdown">
        <a href="#categories">Categories ▼</a>
        <div class="dropdown-content">
          <a href="#laptops">Laptops</a>
          <a href="#phones">Phones</a>
          <a href="#accessories">Accessories</a>
        </div>
      </div>
      <a href="#contact">Contact</a>
    </div>
          <div class="navbar-right">
      <span>🔍</span>
      <span>👤</span>
      <span>🛒</span>
      <span>📄</span>
    </div>
  </div>
</body>
</html>
