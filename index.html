<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unet Solutions</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #d7efff 0%, #bfe2ff 100%);
            color: #17324d;
        }
        .navbar {
            position: relative;
            width: min(1800px, calc(100% - 32px));
            min-height: 88px;
            margin: 18px auto 24px;
            padding: 0 22px;
            background: rgba(255, 255, 255, 0.94);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(130, 171, 208, 0.35);
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(32, 74, 120, 0.16);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            overflow: visible;
            z-index: 20;
        }
        .navbar-left {
            display: flex;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
        }
        .brand-mark {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .brand-mark img {
            height: 58px;
            width: auto;
        }
        .brand-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #0e3b66;
        }
        .nav-link {
            color: #1b3550;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            padding: 10px 14px;
            border-radius: 999px;
            transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
            background: transparent;
        }
        .nav-link:hover {
            background: #eef6ff;
            color: #0b57d0;
            transform: translateY(-1px);
        }
        .dropdown {
            position: relative;
            display: inline-flex;
            align-items: center;
            padding-bottom: 8px;
        }
        .dropdown > button {
            position: relative;
            top: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            font: inherit;
            height: 44px;
            box-sizing: border-box;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            min-width: 220px;
            background: white;
            border: 1px solid #dbe7f3;
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(20, 40, 80, 0.18);
            padding: 10px;
            z-index: 9999;
        }
        .dropdown-content a {
            display: block;
            padding: 12px 14px;
            border-radius: 10px;
            text-decoration: none;
            color: #1f2937;
            font-weight: 600;
        }
        .dropdown-content a:hover {
            background-color: #eef6ff;
            color: #0b57d0;
            transform: translateX(4px);
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        .navbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .icon-btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 44px;
            height: 44px;
            padding: 0 14px;
            background: linear-gradient(135deg, #1787ff, #0a5dd8);
            color: white;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 22px rgba(23, 135, 255, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }
        .icon-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(23, 135, 255, 0.32);
            filter: brightness(1.02);
        }
        .slider {
            position: relative;
            width: 1500px;
            max-width: calc(100% - 32px);
            height: 500px;
            margin: 30px auto;
            overflow: hidden;
            border: 4px solid white;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(27, 53, 80, 0.16);
            z-index: 1;
        }
        .slides {
            display: flex;
            width: 400%;
            animation: slide 20s infinite;
            gap: 8px;
        }
        .slides img {
            width: 25%;
            height: 500px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .image-row {
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: clamp(16px, 2vw, 40px);
            display: flex;
            padding-bottom: 34px;
        }
        .image-row img {
            width: 400px;
            height: auto;
            border-radius: 18px;
            object-fit: cover;
            box-shadow: 0 16px 32px rgba(27, 53, 80, 0.14);
        }
        @keyframes slide {
            0% { transform: translateX(0); }
            20% { transform: translateX(0); }
            25% { transform: translateX(-25%); }
            45% { transform: translateX(-25%); }
            50% { transform: translateX(-50%); }
            70% { transform: translateX(-50%); }
            75% { transform: translateX(-75%); }
            95% { transform: translateX(-75%); }
            100% { transform: translateX(0); }
        }
        @media (max-width: 860px) {
            .navbar {
                padding: 16px;
                gap: 16px;
            }
            .navbar-left,
            .navbar-right {
                gap: 10px;
            }
            .brand-name {
                font-size: 18px;
            }
            .slider,
            .slides img {
                height: 320px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-left">
            <a href="index.html" class="brand-mark">
                <img src="/logo.png" alt="Logo">
                <span class="brand-name">Unet Solutions</span>
            </a>
            <a href="index.html" class="nav-link">Home</a>
            <div class="dropdown">
                <button type="button" class="nav-link">Categories ▼</button>
                <div class="dropdown-content">
                    <a href="/laptops">Laptops</a>
                    <a href="/pc">PC</a>
                    <a href="/gaming">Gaming</a>
                    <a href="/monitor">Monitor</a>
                    <a href="/build%20pc">Build PC</a>
                </div>
            </div>
            <a href="#contact" class="nav-link">Contact</a>
        </div>
        <div class="navbar-right">
            <span class="icon-btn">Search</span>
            <a href="/login/index.html" class="icon-btn">Account</a>
            <span class="icon-btn" id="cartToggle">Cart</span>
        </div>
    </div>
    <div class="slider">
        <div class="slides">
            <img src="/images/slide1.jpg" alt="Slide 1">
            <img src="/images/slide2.jpg" alt="Slide 2">
            <img src="/images/slide3.jpg" alt="Slide 3">
            <img src="/images/slide4.jpg" alt="Slide 4">
        </div>
    </div>
    <div class="image-row" id="categories">
        <a href="/gaming/index.html">
            <img src="/buttons/button1.jpg" alt="Gaming">
        </a>
        <a href="/monitor/index.html">
            <img src="/buttons/button2.jpg" alt="Monitor">
        </a>
        <a href="/laptops/index.html">
            <img src="/buttons/button3.jpg" alt="Laptops">
        </a>
        <a href="/build%20pc/index.html">
            <img src="/buttons/button4.jpg" alt="Build PC">
        </a>
    </div>
    <script type="module">
        import { injectSpeedInsights } from "/node_modules/@vercel/speed-insights/dist/index.mjs";

        injectSpeedInsights();
    </script>
    <script src="/clear-forms.js"></script>
    <script src="/cart.js"></script>
</body>
</html>
