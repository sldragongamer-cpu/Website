<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Unet Solutions | Gaming</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #d7efff 0%, #bfe2ff 100%);
            color: #17324d;
            min-height: 100vh;
        }
        .navbar {
            position: relative;
            width: min(1800px, calc(100% - 32px));
            min-height: 88px;
            margin: 18px auto 24px;
            padding: 0 22px;
            background: rgba(255, 255, 255, 0.94);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(130, 171, 208, 0.35);
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(32, 74, 120, 0.16);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            overflow: visible;
            z-index: 20;
        }
        .navbar-left {
            display: flex;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
        }
        .brand-mark {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .brand-mark img {
            height: 58px;
            width: auto;
        }
        .brand-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #0e3b66;
        }
        .nav-link {
            color: #1b3550;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            padding: 10px 14px;
            border-radius: 999px;
            transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
            background: transparent;
        }
        .nav-link:hover {
            background: #eef6ff;
            color: #0b57d0;
            transform: translateY(-1px);
        }
        .dropdown {
            position: relative;
            display: inline-flex;
            align-items: center;
            padding-bottom: 8px;
        }
        .dropdown > button {
            position: relative;
            top: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            font: inherit;
            height: 44px;
            box-sizing: border-box;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            min-width: 220px;
            background: white;
            border: 1px solid #dbe7f3;
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(20, 40, 80, 0.18);
            padding: 10px;
            z-index: 9999;
        }
        .dropdown-content a {
            display: block;
            padding: 12px 14px;
            border-radius: 10px;
            text-decoration: none;
            color: #1f2937;
            font-weight: 600;
        }
        .dropdown-content a:hover {
            background-color: #eef6ff;
            color: #0b57d0;
            transform: translateX(4px);
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        .navbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .icon-btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 44px;
            height: 44px;
            padding: 0 14px;
            background: linear-gradient(135deg, #1787ff, #0a5dd8);
            color: white;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 22px rgba(23, 135, 255, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }
        .icon-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(23, 135, 255, 0.32);
            filter: brightness(1.02);
        }
        .icon-btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 44px;
            height: 44px;
            padding: 0 14px;
            background: linear-gradient(135deg, #1787ff, #0a5dd8);
            color: white;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 22px rgba(23, 135, 255, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }
        .icon-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(23, 135, 255, 0.32);
            filter: brightness(1.02);
        }
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        .coming-soon {
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            margin-top: 40px;
        }
    </style>
</head>
<body>
<body>
    <div class="navbar">
        <div class="navbar-left">
            <a href="../index.html" class="brand-mark">
                <img src="/logo.png" alt="Logo">
                <span class="brand-name">Unet Solutions</span>
            </a>
            <a href="../home" class="nav-link">Home</a>
            <div class="dropdown">
                <button type="button" class="nav-link">Categories ▼</button>
                <div class="dropdown-content">
                    <a href="../laptops">Laptops</a>
                    <a href="../pc">PC</a>
                    <a href="../gaming">Gaming</a>
                    <a href="../monitor">Monitor</a>
                    <a href="../build-pc/">Build PC</a>
                </div>
            </div>
            <a href="../index.html#contact" class="nav-link">Contact</a>
        </div>
        <div class="navbar-right">
            <span class="icon-btn">Search</span>
            <a href="../login" class="icon-btn">Account</a>
            <span class="icon-btn">Cart</span>
        </div>
    </div>

    <div class="content">
        <h1>Gaming Gear Coming Soon</h1>
        <div class="coming-soon">
            <p style="font-size:64px;margin:0;">🎮</p>
            <p style="font-size:24px;font-weight:700;margin:20px 0;">We're working on adding gaming products!</p>
            <p style="color:#666;">Stay tuned for keyboards, mice, headsets, and more.</p>
        </div>
    </div>
    <script src="/clear-forms.js"></script>
    <script src="/cart.js"></script>
</body>
</html>
