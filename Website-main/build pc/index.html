<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unet Solutions | Build PC</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #d7efff 0%, #bfe2ff 100%);
            color: #17324d;
            min-height: 100vh;
        }
        .navbar {
            position: relative;
            width: min(1800px, calc(100% - 32px));
            min-height: 88px;
            margin: 18px auto 24px;
            padding: 0 22px;
            background: rgba(255, 255, 255, 0.94);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(130, 171, 208, 0.35);
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(32, 74, 120, 0.16);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            overflow: visible;
            z-index: 20;
        }
        .brand-mark {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .brand-mark img {
            height: 58px;
            width: auto;
        }
        .brand-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #0e3b66;
        }
        .nav-link {
            color: #1b3550;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            padding: 10px 14px;
            border-radius: 999px;
            transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
            background: transparent;
        }
        .nav-link:hover {
            background: #eef6ff;
            color: #0b57d0;
            transform: translateY(-1px);
        }
        .icon-btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 44px;
            height: 44px;
            padding: 0 14px;
            background: linear-gradient(135deg, #1787ff, #0a5dd8);
            color: white;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 22px rgba(23, 135, 255, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }
        .icon-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(23, 135, 255, 0.32);
            filter: brightness(1.02);
        }
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        .coming-soon {
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/" class="brand-mark">
            <img src="/logo.png" alt="Logo">
            <span class="brand-name">Unet Solutions</span>
        </a>
        <div style="display:flex;gap:10px;">
            <a href="/" class="nav-link">Home</a>
            <a href="/laptops" class="nav-link">Laptops</a>
            <a href="/pc" class="nav-link">PC</a>
            <a href="/gaming" class="nav-link">Gaming</a>
            <a href="/monitor" class="nav-link">Monitors</a>
            <span class="icon-btn" id="cartToggle">Cart</span>
        </div>
    </div>
    <div class="content">
        <h1>Build Your PC</h1>
        <div class="coming-soon">
            <p style="font-size:64px;margin:0;">🖥️</p>
            <p style="font-size:24px;font-weight:700;margin:20px 0;">PC Builder Coming Soon!</p>
            <p style="color:#666;">Choose your components and build your dream PC.</p>
        </div>
    </div>
    <script src="/clear-forms.js"></script>
    <script src="/cart.js"></script>
</body>
</html>
