<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - UNET Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1787ff, #0a5dd8);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
        .section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
        }
        .section h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1787ff;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1787ff;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .order-summary {
            background: white;
            border: 1px solid #e0e0e0;
        }
        .order-item {
            display: flex;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        .order-item img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 8px;
            background: #f0f7ff;
        }
        .order-item-details {
            flex: 1;
        }
        .order-item-name {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .order-item-price {
            font-size: 14px;
            font-weight: 700;
            color: #0b57d0;
        }
        .order-item-qty {
            font-size: 12px;
            color: #666;
        }
        .order-total {
            padding: 20px 0;
            border-top: 2px solid #1787ff;
            margin-top: 10px;
        }
        .order-total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .order-total-row.grand-total {
            font-size: 20px;
            font-weight: 700;
            color: #0b57d0;
        }
        .empty-cart {
            text-align: center;
            padding: 40px;
        }
        .empty-cart p {
            color: #666;
            margin-bottom: 20px;
        }
        .empty-cart a {
            display: inline-block;
            background: #1787ff;
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
        }
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-back {
            background: #e0e0e0;
            color: #333;
        }
        .btn-back:hover {
            background: #d0d0d0;
        }
        .btn-submit {
            background: linear-gradient(135deg, #1787ff, #0a5dd8);
            color: white;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(23, 135, 255, 0.4);
        }
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .success-message {
            display: none;
            text-align: center;
            padding: 60px 30px;
        }
        .success-message.show {
            display: block;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #28a745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: white;
        }
        .success-message h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        .success-message p {
            color: #666;
            margin-bottom: 20px;
        }
        .order-id {
            background: #f0f7ff;
            padding: 15px 25px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .order-id span {
            font-weight: 700;
            color: #0b57d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Checkout</h1>
            <p>Complete your order</p>
        </div>
        
        <div id="checkoutForm">
            <div class="content">
                <div class="left">
                    <div class="section">
                        <h2>Customer Information</h2>
                        <form id="customerForm">
                            <div class="form-group">
                                <label>Full Name *</label>
                                <input type="text" id="name" required placeholder="Enter your full name">
                            </div>
                            <div class="form-group">
                                <label>Email Address *</label>
                                <input type="email" id="email" required placeholder="Enter your email">
                            </div>
                            <div class="form-group">
                                <label>Phone Number *</label>
                                <input type="tel" id="phone" required placeholder="Enter your phone number">
                            </div>
                            <div class="form-group">
                                <label>City / Location *</label>
                                <input type="text" id="location" required placeholder="Enter your city or location">
                            </div>
                            <div class="form-group">
                                <label>Delivery Address *</label>
                                <textarea id="address" required placeholder="Enter your complete delivery address"></textarea>
                            </div>
                            <div class="form-group">
                                <label>Order Notes (Optional)</label>
                                <textarea id="notes" placeholder="Any special instructions..."></textarea>
                            </div>
                        </form>
                    </div>
                    
                    <div class="buttons">
                        <button class="btn btn-back" onclick="goBack()">Back to Cart</button>
                        <button class="btn btn-submit" id="placeOrderBtn" onclick="placeOrder()">Place Order</button>
                    </div>
                </div>
                
                <div class="right">
                    <div class="section order-summary">
                        <h2>Order Summary</h2>
                        <div id="orderItems"></div>
                        <div class="order-total">
                            <div class="order-total-row">
                                <span>Subtotal</span>
                                <span id="subtotal">Rs. 0</span>
                            </div>
                            <div class="order-total-row">
                                <span>Delivery</span>
                                <span>Free</span>
                            </div>
                            <div class="order-total-row grand-total">
                                <span>Total</span>
                                <span id="total">Rs. 0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="success-message" id="successMessage">
            <div class="success-icon">✓</div>
            <h2>Order Placed Successfully!</h2>
            <p>Thank you for your order. We will contact you shortly.</p>
            <div class="order-id">Order ID: <span id="orderId"></span></div>
            <p>A confirmation email has been sent to your email address.</p>
            <a href="/index.html">Continue Shopping</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        (function() {
            emailjs.init("aqyQLy9ekgqUBGNiM");
        })();

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        function loadOrderItems() {
            const container = document.getElementById('orderItems');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <p>Your cart is empty</p>
                        <a href="/index.html">Go Shopping</a>
                    </div>
                `;
                document.getElementById('placeOrderBtn').disabled = true;
                return;
            }
            
            let itemsHTML = '';
            cart.forEach(item => {
                itemsHTML += `
                    <div class="order-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="order-item-details">
                            <div class="order-item-name">${item.name.substring(0, 50)}...</div>
                            <div class="order-item-qty">Qty: ${item.quantity}</div>
                            <div class="order-item-price">Rs. ${(item.price * item.quantity).toLocaleString()}</div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = itemsHTML;
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('subtotal').textContent = `Rs. ${total.toLocaleString()}`;
            document.getElementById('total').textContent = `Rs. ${total.toLocaleString()}`;
        }
        
        function goBack() {
            window.location.href = '/index.html';
        }
        
        function validateForm() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const location = document.getElementById('location').value.trim();
            const address = document.getElementById('address').value.trim();
            
            if (!name || !email || !phone || !location || !address) {
                showNotification('Please fill in all required fields', 'error');
                return false;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showNotification('Please enter a valid email address', 'error');
                return false;
            }
            
            return true;
        }
        
        function placeOrder() {
            if (!validateForm()) return;
            
            const btn = document.getElementById('placeOrderBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const location = document.getElementById('location').value.trim();
            const address = document.getElementById('address').value.trim();
            const notes = document.getElementById('notes').value.trim();
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            const order = {
                id: 'ORD-' + Date.now(),
                date: new Date().toISOString(),
                items: [...cart],
                total: total,
                status: 'Pending',
                customer: {
                    name: name,
                    email: email,
                    phone: phone,
                    location: location,
                    address: address,
                    notes: notes
                }
            };
            
            saveOrder(order);
            sendOrderEmail(order);
            
            localStorage.removeItem('cart');
            
            document.getElementById('checkoutForm').style.display = 'none';
            document.getElementById('orderId').textContent = order.id;
            document.getElementById('successMessage').classList.add('show');
        }
        
        function saveOrder(order) {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.unshift(order);
            localStorage.setItem('orders', JSON.stringify(orders));
        }
        
        function sendOrderEmail(order) {
            const templateParams = {
                order_id: order.id,
                order_date: new Date(order.date).toLocaleString(),
                customer_name: order.customer.name,
                customer_email: order.customer.email,
                customer_phone: order.customer.phone,
                customer_location: order.customer.location,
                customer_address: order.customer.address,
                order_items: order.items.map(item => `${item.name} x${item.quantity} = Rs. ${(item.price * item.quantity).toLocaleString()}`).join('\n'),
                order_total: `Rs. ${order.total.toLocaleString()}`,
                status: order.status
            };
            
            emailjs.send('service_cxazdfg', 'template_9qiuwyt', templateParams)
                .then(function(response) {
                    console.log('Email sent successfully!', response.status, response.text);
                }, function(error) {
                    console.log('Email failed:', error);
                });
        }
        
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 24px;
                background: ${type === 'success' ? '#28a745' : '#ff4444'};
                color: white;
                border-radius: 12px;
                font-weight: 600;
                z-index: 10000;
                animation: slideDown 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
        
        loadOrderItems();
    </script>
    <style>
        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
    </style>
    <script type="module">
        import { injectSpeedInsights } from "/node_modules/@vercel/speed-insights/dist/index.mjs";
        import { inject } from "/node_modules/@vercel/analytics/dist/index.mjs";

        injectSpeedInsights();
        inject();
    </script>
</body>
</html>
