<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>
    <style>
        body {
         font-family: Arial, sans-serif;
         display: flex;
         justify-content: center;
         align-items: center;
         min-height: 100vh;
         margin: 0;
         background: lightblue;
        }

        .container {
         display: flex;
         gap: 40px;
         flex-wrap: wrap;
         justify-content: center;
         padding: 24px;
        }

        .box {
         width: 300px;
         padding: 20px;
         background: white;
         border-radius: 10px;
         box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        h2 {
         text-align: center;
         margin-bottom: 20px;
        }

        input {
         width: 300px;
         padding: 12px;
         margin: 8px 0;
         border: 1px solid black;
         border-radius: 4px;
         box-sizing: border-box;
         background-color: white;
         color: black;
        }

        input:focus {
         background-color: white;
         color: black;
         outline: none;
        }

        button {
         width: 100%;
         padding: 10px;
         background: blue;
         color: white;
         border: none;
         border-radius: 4px;
         cursor: pointer;
         font-size: 20px;
        }

        button:hover {
         background: darkblue;
        }

        .status-message {
         min-height: 20px;
         margin: 12px 0 0;
         font-size: 14px;
         text-align: center;
        }

        .status-message.error {
         color: #b42318;
        }

        .status-message.success {
         color: #067647;
        }
    </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <h2>Sign In</h2>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <p id="loginMessage" class="status-message" aria-live="polite"></p>
      </form>
    </div>
    <div class="box">
      <h2>Register</h2>
      <form id="registerForm">
        <input type="text" id="regUsername" placeholder="Username" required>
        <input type="email" id="regEmail" placeholder="Email" required>
        <input type="password" id="regPassword" placeholder="Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <button type="submit">Sign Up</button>
        <p id="registerMessage" class="status-message" aria-live="polite"></p>
      </form>
    </div>
  </div>
<script>
  const API_BASE =
    window.location.port === "5000" ? window.location.origin : "http://localhost:5000";

  const setMessage = (elementId, message, type) => {
    const element = document.getElementById(elementId);
    element.textContent = message;
    element.className = type ? `status-message ${type}` : "status-message";
  };

  const postJson = async (url, payload) => {
    const response = await fetch(`${API_BASE}${url}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const contentType = response.headers.get("content-type") || "";
    if (!contentType.includes("application/json")) {
      throw new Error(`Backend is not responding correctly on ${API_BASE}.`);
    }

    const data = await response.json();
    if (!response.ok) {
      throw new Error(data.error || data.message || "Request failed.");
    }

    return data;
  };

  const redirectToHome = () => {
    window.location.href = new URL("../index.html", window.location.href).href;
  };

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    setMessage("loginMessage", "", "");

    try {
      const data = await postJson("/login", {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
      });

      if (data.message === "Login successful") {
        setMessage("loginMessage", "Login successful", "success");
        redirectToHome();
      } else {
        setMessage("loginMessage", data.message || "Login failed", "error");
      }
    } catch (error) {
      setMessage("loginMessage", error.message || "Unable to sign in.", "error");
    }
  });

  document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    setMessage("registerMessage", "", "");

    const password = document.getElementById("regPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
      setMessage("registerMessage", "Passwords do not match", "error");
      return;
    }

    try {
      const data = await postJson("/signup", {
        username: document.getElementById("regUsername").value,
        email: document.getElementById("regEmail").value,
        password
      });

      if (data.message === "User registered successfully") {
        setMessage("registerMessage", "Sign up successful", "success");
        redirectToHome();
      } else {
        setMessage("registerMessage", data.error || data.message || "Sign up failed", "error");
      }
    } catch (error) {
      setMessage("registerMessage", error.message || "Unable to sign up.", "error");
    }
  });
</script>
</body>
</html>
