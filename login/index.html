<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>
        Login
    </title>
    <style>
        body {font-family:
        Arial,sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background:lightblue;
        }
        .login-box {width:300px;
        height:400px;
        margin:100px auto;
        padding:20px;
        background:white;
        border-radius:9px;
        }
        input {width: 270px;
        padding:12px;
        margin: 8px 0;
        }
        button {
        width:100%;
        padding:10px;
        background:blue;
        color:black;
        border:none;
        cursor: pointer;
        font-size:25px;
        }
        button:hover {
        background:blue;
        }
        .signin-btn {
        display: block;
        margin: 0 auto;
        width: 120px;
        padding: 5px 10px;
        font-size: 12px;
        background-color: blue;
        color: black;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        height: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size:20px;
        }
        .signin-btn:hover {
         background-color: blue;
        }
    </style>
</head>
<body>
 <div class="login-box">
     <h2><center>Login</center></h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <br>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
      <br>
      <center>or</center>
      <br>
      <a href="sign-up/index.html" class="signin-btn">Sign Up</a>
    </form>
 </div>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const res = await fetch("http://localhost:5000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("username").value,
          password: document.getElementById("password").value
        })
      });
      const data = await res.json();
      alert(data.message);
    });
  </script>
</body>
</html>
