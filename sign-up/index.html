<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>
        Login
    </title>
    <style>
        body {font-family:
        Arial,sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background:lightblue;
        }
        .login-box {width:300px;
        height:400px;
        margin:100px auto;
        padding:20px;
        background:white;
        border-radius:9px;
        }
        input {width: 270px;
        padding:12px;
        margin: 8px 0;
        }
        button {
        width:100%;
        padding:10px;
        background:blue;
        color:black;
        border:none;
        cursor: pointer;
        font-size:25px;
        }
        button:hover {
        background:blue;
        }
        .signin-btn {
        display: block;
        margin: 0 auto;
        width: 120px;
        padding: 5px 10px;
        font-size: 12px;
        background-color: blue;
        color: black;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        height: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size:20px;
        }
        .signin-btn:hover {
         background-color: blue;
        }
        .status-message {
        min-height: 20px;
        margin-top: 12px;
        font-size: 14px;
        text-align: center;
        }
        .status-message.error {
        color: #b42318;
        }
        .status-message.success {
        color: #067647;
        }
    </style>
</head>
<body>
 <div class="login-box">
     <h2><center>Login</center></h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <br>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
      <p id="loginMessage" class="status-message" aria-live="polite"></p>
      <br>
      <center>or</center>
      <br>
      <a href="../login/" class="signin-btn">Sign Up</a>
    </form>
 </div>
  <script>
    const API_BASE =
      window.location.port === "5000" ? window.location.origin : "http://localhost:5000";

    const setMessage = (message, type) => {
      const element = document.getElementById("loginMessage");
      element.textContent = message;
      element.className = `status-message ${type}`;
    };

    const postJson = async (url, payload) => {
      const response = await fetch(`${API_BASE}${url}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const contentType = response.headers.get("content-type") || "";
      if (!contentType.includes("application/json")) {
        throw new Error(`Backend is not responding correctly on ${API_BASE}.`);
      }

      let data = {};
      try {
        data = await response.json();
      } catch (error) {
        throw new Error("Server returned an invalid response.");
      }

      if (!response.ok) {
        throw new Error(data.error || data.message || "Request failed.");
      }

      return data;
    };

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      setMessage("", "");
      try {
        const data = await postJson("/login", {
          username: document.getElementById("username").value,
          password: document.getElementById("password").value
        });

        if (data.message === "Login successful") {
          setMessage("Login successful", "success");
          window.location.href = new URL("../home/index.html", window.location.href).href;
        } else {
          setMessage(data.message || "Login failed", "error");
        }
      } catch (error) {
        setMessage(error.message || `Unable to sign in. Check that ${API_BASE} is running.`, "error");
      }
    });
  </script>
    <script src="/clear-forms.js"></script>
</body>
</html>
